<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <h1 class="app-title">💰 Expense &amp; Budget Visualizer</h1>
      <button id="btn-dark-mode" class="btn-icon" title="Toggle dark mode" aria-label="Toggle dark mode">
        <span id="dark-mode-icon">🌙</span>
      </button>
    </div>
  </header>

  <main class="container">

    <!-- ===== TOTAL SPENDING CARD ===== -->
    <section class="card card-balance" aria-label="Total spending">
      <p class="balance-label">Total Spending</p>
      <p class="balance-amount" id="total-spending">Rp 0</p>
    </section>

    <!-- ===== ADD TRANSACTION CARD ===== -->
    <section class="card" aria-label="Add transaction">
      <h2 class="card-title">Add Transaction</h2>
      <form id="transaction-form" novalidate>

        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input
            type="text"
            id="item-name"
            placeholder="e.g. Lunch"
            autocomplete="off"
          />
          <span class="field-error" id="err-name"></span>
        </div>

        <div class="form-group">
          <label for="amount">Amount (Rp)</label>
          <input
            type="number"
            id="amount"
            placeholder="e.g. 30000"
            min="1"
          />
          <span class="field-error" id="err-amount"></span>
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <div class="category-select-row">
            <select id="category">
              <!-- Populated dynamically by renderCategories() -->
            </select>
            <button type="button" id="btn-add-category" class="btn btn-secondary btn-sm" title="Add custom category">
              + New
            </button>
          </div>
          <span class="field-error" id="err-category"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Add Transaction</button>
      </form>
    </section>

    <!-- ===== TRANSACTION HISTORY CARD ===== -->
    <section class="card" aria-label="Transaction history">
      <div class="card-title-row">
        <h2 class="card-title">Transaction History</h2>
        <div class="sort-controls">
          <label for="sort-select" class="sr-only">Sort by</label>
          <select id="sort-select" aria-label="Sort transactions">
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="amount-desc">Amount ↓</option>
            <option value="amount-asc">Amount ↑</option>
            <option value="category-asc">Category A–Z</option>
          </select>
        </div>
      </div>

      <div class="transaction-list-wrapper">
        <ul id="transaction-list" class="transaction-list">
          <!-- Populated dynamically -->
        </ul>
        <p id="empty-msg" class="empty-msg">No transactions yet. Add one above!</p>
      </div>
    </section>

    <!-- ===== CHART CARD ===== -->
    <section class="card" aria-label="Spending chart">
      <h2 class="card-title">Spending by Category</h2>
      <div class="chart-wrapper">
        <canvas id="expense-chart" aria-label="Pie chart of expenses by category" role="img"></canvas>
      </div>
      <p id="chart-empty-msg" class="empty-msg">Add transactions to see the chart.</p>
    </section>

  </main>

  <!-- ===== ADD CATEGORY MODAL ===== -->
  <div id="category-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal">
      <h3 id="modal-title">Add Custom Category</h3>
      <div class="form-group">
        <label for="new-category-input">Category Name</label>
        <input type="text" id="new-category-input" placeholder="e.g. Health" autocomplete="off" />
        <span class="field-error" id="err-new-category"></span>
      </div>
      <div class="modal-actions">
        <button id="btn-save-category" class="btn btn-primary">Save</button>
        <button id="btn-cancel-category" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
